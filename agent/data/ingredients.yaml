# =============================================================================
# ingredients.yaml — 地元食材データの正本 (Slice 1: 3 都道府県 × 10 件)
# =============================================================================
# 構造は src/domain/locale.ts (Locale) + src/domain/ingredient.ts (Ingredient) と一致。
# scripts/build-ingredient-data.mjs が読み込み、Zod 検証して
# src/data/ingredients.generated.json を生成する。
#
# 値追加・編集時は scripts の Zod スキーマも参照すること。
# 後続スライス (5: 楽天連動) で searchQuery を検索キーとして使う。
# =============================================================================

