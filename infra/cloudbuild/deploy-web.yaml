# =============================================================================
# Cloud Build — mlpr-web build + deploy
# =============================================================================
# 呼び出し:
#   gcloud builds submit \
#     --config=infra/cloudbuild/deploy-web.yaml \
#     --substitutions=_TAG=$(git rev-parse --short HEAD) \
#     .
#
# 前提:
#   - infra/terraform/ で apply 済 (AR repo / Cloud Run service / SA が存在)
#   - 実行 SA は mlpr-deployer (run.admin / artifactregistry.writer 付き)
# =============================================================================

substitutions:
  _REGION: 'asia-northeast1'
  _REPO: 'mlpr'
  _SERVICE: 'mlpr-web'
  _TAG: 'manual'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  # 64bit Linux amd64 image を作る (Cloud Run は amd64/arm64 両対応だが安定優先)
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

timeout: 1800s # 30 min (deps install + next build で 5〜10 min かかる)

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:latest'

steps:
  # 1. Docker build (Web: ./Dockerfile)
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:${_TAG}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:latest
      - --file=Dockerfile
      - .

  # 2. Push (images: 配列で自動 push されるので step は不要だが明示)
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web

  # 3. Cloud Run deploy
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --quiet
