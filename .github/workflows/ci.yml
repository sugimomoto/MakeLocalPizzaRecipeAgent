name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # version は package.json の packageManager (pnpm@10.33.0) から自動解決
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare .env (Firebase env を build に焼き込み)
        # `.env.example` には fake-api-key + USE_FIREBASE_EMULATOR=true 等が入って
        # おり、build に焼き込んでも本番値ではない。CI runtime で実際に Firebase
        # に接続することはなく、AuthProvider 側で getFirebaseAuth() が throw した
        # ら unauthenticated に fall through する防御も入っている。
        run: cp .env.example .env

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  e2e:
    name: E2E — Playwright journey (mock agent)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare .env (E2E は production build を経由するので env を作る)
        run: cp .env.example .env

      - name: Install Playwright browsers (chromium)
        run: pnpm exec playwright install --with-deps chromium
        env:
          # package.json の test:e2e と同じ path にインストール
          PLAYWRIGHT_BROWSERS_PATH: './.cache/ms-playwright'

      - name: Run E2E (build + start + journey)
        run: pnpm test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rules:
    name: Rules — Firestore + Storage Security Rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21 (Firestore/Storage Emulator が JVM 起動)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install firebase-tools
        run: npm i -g firebase-tools@15

      - name: Run rules tests via Firebase Emulator
        # emulators:exec が auth/firestore/storage を一時起動 → 中で test:rules を実行
        # → 終了で Emulator を片付ける。Firestore/Storage が listen するのを待つ。
        run: firebase emulators:exec --only auth,firestore,storage --project=mlpr-local "pnpm test:rules"

      - name: Upload Emulator log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-emulator-log
          path: |
            firebase-debug.log
            firestore-debug.log
            storage-debug.log
            ui-debug.log
          if-no-files-found: ignore
          retention-days: 7

  python:
    name: Python — ruff / mypy / pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./agent
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        run: uv run mypy .

      - name: Test (pytest)
        run: uv run pytest

  terraform:
    name: Terraform — fmt + validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # required_version >= 1.6。terraform 1.6.0 は provider GPG key が
          # 期限切れになるため、現行 stable (1.11+) を使う。
          terraform_version: '1.11.0'
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        # GCS backend は CI から触らない (state を持たない)、provider plugin
        # のダウンロードのみ目的。
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate
